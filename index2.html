<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL ACCESS: REQUIRED</title>
    <style>
        body {
            background-color: #050505;
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        /* Glitch Effect */
        .glitch {
            position: relative;
            font-size: 5rem;
            font-weight: bold;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                        -0.025em -0.05em 0 rgba(0, 255, 0, 0.75),
                        0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            animation: glitch 500ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 rgba(0, 255, 0, 0.75), 0.025em 0.05em 0 rgba(0, 0, 255, 0.75); }
            14% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 rgba(0, 255, 0, 0.75), 0.025em 0.05em 0 rgba(0, 0, 255, 0.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 rgba(0, 255, 0, 0.75), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75); }
            49% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 rgba(0, 255, 0, 0.75), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 rgba(0, 255, 0, 0.75), 0 -0.05em 0 rgba(0, 0, 255, 0.75); }
            99% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 rgba(0, 255, 0, 0.75), 0 -0.05em 0 rgba(0, 0, 255, 0.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255, 0, 0, 0.75), -0.025em -0.025em 0 rgba(0, 255, 0, 0.75), -0.025em -0.05em 0 rgba(0, 0, 255, 0.75); }
        }

        #scary-text {
            font-size: 1rem;
            letter-spacing: 3px;
            margin-top: 30px;
            color: #555;
            animation: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 0.9; }
        }

        #reveal-message {
            display: none;
            background: #111;
            padding: 50px;
            border: 1px solid #fff;
            color: #fff;
            max-width: 600px;
            line-height: 1.6;
            font-size: 1.3rem;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="countdown-container">
        <div style="color: #444; margin-bottom: 10px;">ESTABLISHING UPLINK...</div>
        <div id="timer" class="glitch">00:00:00</div>
        <div id="scary-text">
            COUNTDOWN TO HORRIBLY SCARY, <br>
            BORDERLINE HAZING, BED WETTING TASK
        </div>
    </div>

    <div id="reveal-message">
        <p>Yesterday, Joshua Mavino's big did me a favor and texted you for me.</p>
        <p><strong>Thank them by gifting Josh a fruit with a face drawn on.</strong></p>
        <p style="font-size: 1rem; color: #888; margin-top: 20px;">Tell him to send a picture of the fruit to his big.</p>
    </div>

    <script>
        function updateTimer() {
            const now = new Date();
            const target = new Date();
            // Targets 3:00 PM today
            target.setHours(15, 0, 0, 0);

            const diff = target - now;

            if (diff <= 0) {
                document.getElementById('countdown-container').classList.add('hidden');
                document.getElementById('reveal-message').style.display = 'block';
                document.body.style.backgroundColor = "#000"; // Solid black for reveal
                return;
            }

            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            const secs = Math.floor((diff / 1000) % 60);

            document.getElementById('timer').innerText = 
                `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
